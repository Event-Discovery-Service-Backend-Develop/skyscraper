<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Tester - Scientific Data Harvester</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        input { padding: 8px; margin: 5px; width: 200px; }
        textarea { width: 100%; height: 200px; margin: 10px 0; }
        .token { background: #f0f0f0; padding: 10px; word-break: break-all; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 API Tester - Scientific Data Harvester</h1>

        <div class="section">
            <h2>1. Получить JWT токен</h2>
            <input type="text" id="username" placeholder="username" value="admin">
            <input type="password" id="password" placeholder="password" value="admin123">
            <button onclick="getToken()">Получить токен</button>
            <div id="token-result"></div>
        </div>

        <div class="section">
            <h2>2. Тестировать API</h2>
            <div id="token-display" style="display: none;">
                <strong>Токен:</strong> <span id="current-token" class="token"></span>
            </div>
            <button onclick="testAPI('/api/works/?page=1&page_size=3')">Получить работы</button>
            <button onclick="testAPI('/api/works/?search=machine')">Поиск "machine"</button>
            <button onclick="testAPI('/api/works/?publication_year=2050')">Фильтр по году</button>
            <button onclick="testAPI('/health/')">Health check</button>
            <div id="api-result"></div>
        </div>

        <div class="section">
            <h2>3. Ссылки</h2>
            <a href="/admin/" target="_blank">Админ панель</a> |
            <a href="/" target="_blank">Главная</a> |
            <a href="/health/" target="_blank">Health</a>
        </div>
    </div>

    <script>
        let accessToken = '';

        async function getToken() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/token/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    accessToken = data.access;
                    document.getElementById('token-result').innerHTML =
                        '<span class="success">✅ Токен получен!</span>';
                    document.getElementById('token-display').style.display = 'block';
                    document.getElementById('current-token').textContent = accessToken;
                } else {
                    document.getElementById('token-result').innerHTML =
                        '<span class="error">❌ Ошибка: ' + JSON.stringify(data) + '</span>';
                }
            } catch (error) {
                document.getElementById('token-result').innerHTML =
                    '<span class="error">❌ Ошибка сети: ' + error.message + '</span>';
            }
        }

        async function testAPI(endpoint) {
            const headers = { 'Content-Type': 'application/json' };

            if (accessToken && !endpoint.includes('/health/')) {
                headers['Authorization'] = `Bearer ${accessToken}`;
            }

            try {
                const response = await fetch(endpoint, { headers });
                const data = await response.json();

                let result = `<strong>${response.status} ${response.statusText}</strong><br>`;
                result += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';

                document.getElementById('api-result').innerHTML = result;
            } catch (error) {
                document.getElementById('api-result').innerHTML =
                    '<span class="error">❌ Ошибка: ' + error.message + '</span>';
            }
        }

        // Автоматически получаем токен при загрузке
        window.onload = function() {
            getToken();
        };
    </script>
</body>
</html>
