services:
  db:
    image: postgres:15
    container_name: skyscraper_db
    restart: always
    environment:
      POSTGRES_DB: skyscraper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skyscraper"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: skyscraper_web
    restart: always
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: